<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plus Ultra — Userflow Viewer</title>
<style>
  :root {
    --bg: #0e0e0e;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --border: #2a2a2a;
    --accent: #484848;
    --accent-bright: #b0b0b0;
    --text: #dedede;
    --text-dim: #7a7a7a;
    --text-muted: #404040;
    --yellow: #c8a84b;
    --red: #c0504a;
    --sidebar-w: 220px;
    --config-h: 52px;
    --phone-w: 215px;
    --phone-h: 464px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; display: flex; flex-direction: column; }

  /* CONFIG BAR */
  #config-bar {
    height: var(--config-h);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; padding: 0 16px;
    flex-shrink: 0;
  }
  #config-bar label { color: var(--text-dim); font-size: 11px; white-space: nowrap; }
  #config-bar input {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 12px;
    outline: none;
  }
  #config-bar input:focus { border-color: var(--accent); }
  #input-url { width: 200px; }
  #input-tribe { width: 260px; }
  .config-sep { color: var(--text-muted); }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
  #status-dot.online { background: var(--accent-bright); }
  #status-label { font-size: 11px; color: var(--text-dim); }
  .app-title { color: var(--accent-bright); font-weight: bold; font-size: 12px; letter-spacing: 0.05em; margin-right: 8px; }

  /* LAYOUT */
  #layout { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  #sidebar {
    width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border);
    overflow-y: auto; flex-shrink: 0; padding-bottom: 24px;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: var(--bg2); }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-header {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 12px 6px;
    color: var(--text-dim); font-size: 10px; font-weight: bold; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer; user-select: none;
    border-top: 1px solid var(--border); margin-top: 4px;
  }
  .section-header:first-child { border-top: none; margin-top: 0; }
  .section-chevron { font-size: 9px; transition: transform 0.15s; margin-left: auto; }
  .section-collapsed .section-chevron { transform: rotate(-90deg); }
  .section-flows { overflow: hidden; }
  .section-collapsed .section-flows { display: none; }

  .flow-item {
    display: flex; align-items: baseline; gap: 6px;
    padding: 5px 12px 5px 16px; cursor: pointer;
    color: var(--text-dim); line-height: 1.3;
    border-left: 2px solid transparent;
    transition: background 0.1s, color 0.1s;
  }
  .flow-item:hover { background: var(--bg3); color: var(--text); }
  .flow-item.active { background: var(--bg3); color: var(--accent-bright); border-left-color: var(--accent-bright); }
  .flow-num { font-size: 10px; color: var(--text-muted); flex-shrink: 0; width: 22px; }
  .flow-item.active .flow-num { color: var(--accent); }
  .flow-title-text { font-size: 11px; }

  /* MAIN */
  #main { flex: 1; overflow-y: auto; padding: 24px 28px; }
  #main::-webkit-scrollbar { width: 6px; }
  #main::-webkit-scrollbar-track { background: var(--bg); }
  #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .flow-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .flow-header h2 { font-size: 18px; color: var(--text); font-weight: bold; }
  .flow-id { color: var(--text-muted); font-size: 13px; }
  .mode-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 3px;
    border: 1px solid var(--accent); color: var(--accent-bright); margin-left: auto;
  }
  .flow-summary { color: var(--text-dim); font-size: 12px; line-height: 1.6; margin-bottom: 20px; max-width: 55ch; }
  .section-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 20px; }

  /* STEPS */
  .steps-grid { display: flex; flex-direction: column; }

  .step-card {
    display: flex; gap: 32px; align-items: flex-start;
    padding: 32px 0;
    border-top: 1px solid var(--border);
  }
  .step-card:first-child { border-top: none; padding-top: 0; }
  .step-left { flex-shrink: 0; }
  .step-right { flex: 1; min-width: 0; max-width: 55ch; padding-top: 4px; }

  .step-n { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .step-screen { font-size: 12px; font-weight: bold; color: var(--text); margin-bottom: 4px; }
  .step-desc { font-size: 11px; color: var(--text-dim); line-height: 1.6; margin-bottom: 8px; }
  .step-action { font-size: 11px; color: var(--accent-bright); line-height: 1.5; }
  .step-action::before { content: '\25B6 '; color: var(--accent); }

  /* NOTE CARD */
  .step-note {
    font-size: 11px; color: var(--yellow); background: #1a1800; border: 1px solid #2e2a1a;
    border-radius: 6px; padding: 10px 12px; line-height: 1.6; margin-bottom: 8px;
  }

  /* PHONE FRAME */
  .phone-wrap {
    width: var(--phone-w); height: var(--phone-h);
    overflow: hidden; border-radius: 28px;
    border: 2px solid #282828;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    flex-shrink: 0; background: #0a0a0a;
  }
  .phone-wrap iframe {
    width: 390px; height: 844px;
    transform: scale(0.55); transform-origin: top left;
    border: none; display: block;
  }
  .phone-controls {
    display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap;
  }
  .btn-reset {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim);
    font-family: inherit; font-size: 11px; padding: 3px 10px; border-radius: 4px;
    cursor: pointer; transition: background 0.1s, color 0.1s;
  }
  .btn-reset:hover { background: var(--accent); color: var(--text); border-color: var(--accent); }
  .phone-label { font-size: 10px; color: var(--text-muted); }

  /* INJECT BUTTON */
  .btn-inject {
    background: #1a1800; border: 1px solid #302c18; color: var(--yellow);
    font-family: inherit; font-size: 11px; padding: 3px 10px; border-radius: 4px;
    cursor: pointer; transition: background 0.1s;
  }
  .btn-inject:hover { background: #222018; }

  /* MANUAL CARD */
  .manual-card {
    width: var(--phone-w); background: var(--bg3); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; text-align: center;
  }
  .manual-icon { font-size: 28px; margin-bottom: 8px; }
  .manual-title { font-size: 11px; font-weight: bold; color: var(--text); margin-bottom: 6px; }
  .manual-desc { font-size: 10px; color: var(--text-dim); line-height: 1.5; }

  /* EMPTY STATE */
  #empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 60vh; color: var(--text-muted); text-align: center; gap: 12px;
  }
  .empty-icon { font-size: 40px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 20px; right: 20px; z-index: 9999;
    background: #1e1e1e; border: 1px solid #2a2a2a; color: #dedede;
    padding: 8px 14px; border-radius: 6px; font-size: 12px;
    font-family: 'SF Mono', monospace; max-width: 360px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); transition: opacity 0.3s;
    opacity: 0; pointer-events: none;
  }
  #toast.visible { opacity: 1; }

  @media (max-width: 900px) {
    .step-card { flex-direction: column; }
  }
</style>
</head>

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')

}

// ─── APP STATE ────────────────────────────────────────────────────────────────
let appUrl = localStorage.getItem('pu:appUrl') || 'http://localhost:5175';
let tribeId = localStorage.getItem('pu:tribeId') || '';
let activeFlowId = null;
let collapsedSections = {};
try { collapsedSections = JSON.parse(localStorage.getItem('pu:collapsed') || '{}'); } catch(e) {}

// ─── DOM REFS ─────────────────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const mainEl  = document.getElementById('main');
const inputUrl   = document.getElementById('input-url');
const inputTribe = document.getElementById('input-tribe');
const statusDot  = document.getElementById('status-dot');
const statusLabel = document.getElementById('status-label');
const toast = document.getElementById('toast');

// ─── INIT INPUTS ─────────────────────────────────────────────────────────────
inputUrl.value   = appUrl;
inputTribe.value = tribeId;

// ─── ROUTE HELPERS ───────────────────────────────────────────────────────────
function resolveRoute(route) {
  const base = appUrl.replace(/\/$/, '');
  const path = route.replace(/\{TRIBE\}/g, tribeId || 'NO_TRIBE_ID_SET');
  return base + path;
}

// ─── STATUS CHECK ─────────────────────────────────────────────────────────────
let checkTimer;
function checkStatus() {
  const img = new Image();
  const start = Date.now();
  img.onload = function() {
    statusDot.className = 'online';
    statusLabel.textContent = 'online (' + (Date.now() - start) + 'ms)';
  };
  img.onerror = function() {
    statusDot.className = '';
    statusLabel.textContent = 'server not reachable';
  };
  img.src = appUrl.replace(/\/$/, '') + '/favicon.ico?' + Date.now();
}
function scheduleCheck() {
  clearTimeout(checkTimer);
  checkTimer = setTimeout(function() { checkStatus(); scheduleCheck(); }, 5000);
}
checkStatus();
scheduleCheck();

// ─── CONFIG EVENTS ────────────────────────────────────────────────────────────
inputUrl.addEventListener('change', function() {
  appUrl = inputUrl.value.trim().replace(/\/$/, '');
  localStorage.setItem('pu:appUrl', appUrl);
  checkStatus();
  reloadAllIframes();
});
inputTribe.addEventListener('change', function() {
  tribeId = inputTribe.value.trim();
  localStorage.setItem('pu:tribeId', tribeId);
  reloadAllIframes();
});

function reloadAllIframes() {
  document.querySelectorAll('iframe[data-route]').forEach(function(iframe) {
    iframe.src = resolveRoute(iframe.dataset.route);
  });
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError) {
  toast.textContent = msg;
  toast.style.borderColor = isError ? '#c0504a' : '#2a2a2a';
  toast.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toast.classList.remove('visible'); }, 3000);
}

// ─── GRID-DOWN INJECTION ─────────────────────────────────────────────────────
function injectGridDown(iframeId, flowId, stepN) {
  const iframe = document.getElementById(iframeId);
  if (!iframe) return;
  const flow = FLOWS.find(function(f) { return f.id === flowId; });
  const step = flow && flow.steps.find(function(s) { return s.n === stepN; });
  if (!step) return;

  const key = step.gridDownKey;
  const value = typeof step.gridDownValue === 'function'
    ? step.gridDownValue()
    : step.gridDownValue;
  const valueStr = typeof value === 'string' ? value : String(value);

  try {
    iframe.contentWindow.localStorage.setItem(key, valueStr);
    iframe.contentWindow.location.reload();
    showToast('Injected: ' + key);
  } catch(e) {
    showToast('Injection failed — ensure app runs at the configured URL (same origin required).', true);
  }
}

// ─── RESET IFRAME ─────────────────────────────────────────────────────────────
function resetIframe(iframeId, route) {
  const iframe = document.getElementById(iframeId);
  if (iframe) iframe.src = resolveRoute(route);
}

// ─── DOM HELPERS ─────────────────────────────────────────────────────────────
function el(tag, props, children) {
  const node = document.createElement(tag);
  if (props) {
    Object.entries(props).forEach(function(kv) {
      if (kv[0] === 'className') node.className = kv[1];
      else if (kv[0] === 'textContent') node.textContent = kv[1];
      else if (kv[0] === 'title') node.title = kv[1];
      else node.setAttribute(kv[0], kv[1]);
    });
  }
  if (children) children.forEach(function(c) { if (c) node.appendChild(c); });
  return node;
}
function txt(str) { return document.createTextNode(String(str)); }

// ─── SIDEBAR RENDER ───────────────────────────────────────────────────────────
function renderSidebar() {
  while (sidebar.firstChild) sidebar.removeChild(sidebar.firstChild);

  SECTIONS.forEach(function(section) {
    const flows = FLOWS.filter(function(f) { return f.section === section; });
    if (!flows.length) return;

    const isCollapsed = !!collapsedSections[section];
    const sectionGroup = el('div', { className: 'section-group' + (isCollapsed ? ' section-collapsed' : '') });

    const header = el('div', { className: 'section-header' });
    const headerLabel = el('span', { textContent: section });
    const chevron = el('span', { className: 'section-chevron', textContent: '\u25BC' });
    header.appendChild(headerLabel);
    header.appendChild(chevron);
    header.addEventListener('click', function() {
      sectionGroup.classList.toggle('section-collapsed');
      collapsedSections[section] = sectionGroup.classList.contains('section-collapsed');
      localStorage.setItem('pu:collapsed', JSON.stringify(collapsedSections));
    });
    sectionGroup.appendChild(header);

    const flowsContainer = el('div', { className: 'section-flows' });
    flows.forEach(function(flow) {
      const item = el('div', { className: 'flow-item' + (flow.id === activeFlowId ? ' active' : '') });
      item.dataset.id = String(flow.id);
      const numSpan = el('span', { className: 'flow-num', textContent: String(flow.id).padStart(2, '0') });
      const titleSpan = el('span', { className: 'flow-title-text', textContent: flow.title });
      item.appendChild(numSpan);
      item.appendChild(titleSpan);
      item.addEventListener('click', function() { selectFlow(flow.id); });
      flowsContainer.appendChild(item);
    });
    sectionGroup.appendChild(flowsContainer);
    sidebar.appendChild(sectionGroup);
  });
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function selectFlow(id) {
  activeFlowId = id;
  localStorage.setItem('pu:activeFlow', String(id));

  document.querySelectorAll('.flow-item').forEach(function(item) {
    item.classList.toggle('active', Number(item.dataset.id) === id);
  });

  const flow = FLOWS.find(function(f) { return f.id === id; });
  if (flow) renderFlow(flow);
  mainEl.scrollTop = 0;
}

function renderFlow(flow) {
  while (mainEl.firstChild) mainEl.removeChild(mainEl.firstChild);

  // Header
  const flowHeader = el('div', { className: 'flow-header' });
  flowHeader.appendChild(el('span', { className: 'flow-id', textContent: '#' + String(flow.id).padStart(2, '0') }));
  const h2 = el('h2', {});
  h2.textContent = flow.title;
  flowHeader.appendChild(h2);
  flowHeader.appendChild(el('span', { className: 'mode-badge', textContent: 'Mode: ' + flow.mode }));
  mainEl.appendChild(flowHeader);

  mainEl.appendChild(el('div', { className: 'section-label', textContent: flow.section }));
  mainEl.appendChild(el('p', { className: 'flow-summary', textContent: flow.summary }));

  const grid = el('div', { className: 'steps-grid' });

  flow.steps.forEach(function(step) {
    const card = el('div', { className: 'step-card' });

    // Left column
    const leftEl = el('div', { className: 'step-left' });

    if (step.manual) {
      const manualCard = el('div', { className: 'manual-card' });
      manualCard.appendChild(el('div', { className: 'manual-icon', textContent: '\u26A0' }));
      manualCard.appendChild(el('div', { className: 'manual-title', textContent: 'Manual Testing Required' }));
      manualCard.appendChild(el('div', { className: 'manual-desc', textContent: step.manualDesc }));
      leftEl.appendChild(manualCard);
    } else {
      const iframeId = 'iframe-' + flow.id + '-' + step.n;
      const route = resolveRoute(step.route);

      const phoneWrap = el('div', { className: 'phone-wrap' });
      const iframe = document.createElement('iframe');
      iframe.id = iframeId;
      iframe.dataset.route = step.route;
      iframe.src = route;
      iframe.loading = 'lazy';
      iframe.title = 'Step ' + step.n + ': ' + step.screen;
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals');
      phoneWrap.appendChild(iframe);
      leftEl.appendChild(phoneWrap);

      const controls = el('div', { className: 'phone-controls' });

      const resetBtn = el('button', { className: 'btn-reset', textContent: '\u21BA reset' });
      (function(fid, route) {
        resetBtn.addEventListener('click', function() { resetIframe(fid, route); });
      }(iframeId, step.route));
      controls.appendChild(resetBtn);
      controls.appendChild(el('span', { className: 'phone-label', textContent: '390\xD7844 \xB7 0.55\xD7' }));

      if (step.gridDown) {
        const injectBtn = el('button', { className: 'btn-inject', textContent: '\u26A1 Inject Offline State' });
        (function(fid, fid2, sn) {
          injectBtn.addEventListener('click', function() { injectGridDown(fid, fid2, sn); });
        }(iframeId, flow.id, step.n));
        controls.appendChild(injectBtn);
      }

      leftEl.appendChild(controls);
    }

    // Right column
    const rightEl = el('div', { className: 'step-right' });
    rightEl.appendChild(el('div', { className: 'step-n', textContent: 'Step ' + step.n }));
    rightEl.appendChild(el('div', { className: 'step-screen', textContent: step.screen }));
    rightEl.appendChild(el('div', { className: 'step-desc', textContent: step.desc }));

    if (step.note) {
      rightEl.appendChild(el('div', { className: 'step-note', textContent: '\u26A0 Note: ' + step.note }));
    }
    if (step.gridDown) {
      rightEl.appendChild(el('div', { className: 'step-note', textContent: '\u26A1 Grid-Down flow — tap "Inject Offline State" to set localStorage in the iframe and simulate offline conditions.' }));
    }

    rightEl.appendChild(el('div', { className: 'step-action', textContent: step.action }));

    card.appendChild(leftEl);
    card.appendChild(rightEl);
    grid.appendChild(card);
  });

  mainEl.appendChild(grid);
}

// ─── KEYBOARD NAVIGATION ─────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const current = FLOWS.findIndex(function(f) { return f.id === activeFlowId; });
  if ((e.key === 'ArrowDown' || e.key === 'j') && current < FLOWS.length - 1) {
    selectFlow(FLOWS[current + 1].id);
  } else if ((e.key === 'ArrowUp' || e.key === 'k') && current > 0) {
    selectFlow(FLOWS[current - 1].id);
  }
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
renderSidebar();

const lastActive = parseInt(localStorage.getItem('pu:activeFlow') || '0', 10);
if (lastActive && FLOWS.find(function(f) { return f.id === lastActive; })) {
  selectFlow(lastActive);
}
</script>
</body>
</html>
